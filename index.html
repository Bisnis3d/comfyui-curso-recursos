<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de VRAM · IA Generativa ComfyUI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #09090b; color: #e2e8f0; font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 99px; }
    select, input, button { font-family: inherit; }
    table { border-collapse: collapse; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ─── DATA ────────────────────────────────────────────────────────────────

    const MODELOS = {
      sdxl: {
        label: "SDXL", color: "#4f8ef7",
        items: [
          { id: "jxl",        name: "Juggernaut XL",           tipo: "Checkpoint", fmt: "fp16",    vram: 6.5,  notas: "Modelo base del curso" },
          { id: "realvis",    name: "RealVisXL",                tipo: "Checkpoint", fmt: "fp16",    vram: 6.5,  notas: "Fotorrealismo · VFX · composición" },
          { id: "dreamsxl",   name: "DreamShaper XL",           tipo: "Checkpoint", fmt: "fp16",    vram: 6.5,  notas: "Concept art · ficción" },
          { id: "sdxl_inp",   name: "SDXL Inpainting",          tipo: "Checkpoint", fmt: "fp16",    vram: 6.5,  notas: "Inpainting nativo D8" },
          { id: "sdxl_vae",   name: "VAE SDXL",                 tipo: "VAE",        fmt: "fp16",    vram: 0.4,  notas: "Se suma al checkpoint activo" },
          { id: "cn_dep",     name: "ControlNet Depth XL",      tipo: "ControlNet", fmt: "fp16",    vram: 1.5,  notas: "Control estructural D6" },
          { id: "cn_can",     name: "ControlNet Canny XL",      tipo: "ControlNet", fmt: "fp16",    vram: 1.5,  notas: "Control de bordes D6" },
          { id: "cn_pose",    name: "ControlNet Pose XL",       tipo: "ControlNet", fmt: "fp16",    vram: 1.5,  notas: "Control de personaje D7" },
          { id: "cn_line",    name: "ControlNet Lineart XL",    tipo: "ControlNet", fmt: "fp16",    vram: 1.5,  notas: "Control artístico D6" },
          { id: "cn_tile",    name: "ControlNet Tile SDXL",     tipo: "ControlNet", fmt: "fp16",    vram: 1.5,  notas: "Detalle en upscaling D7·D11" },
          { id: "ipa_b",      name: "IP-Adapter SDXL",          tipo: "IP-Adapter", fmt: "fp16",    vram: 0.6,  notas: "Transferencia de apariencia D10" },
          { id: "ipa_p",      name: "IP-Adapter SDXL Plus",     tipo: "IP-Adapter", fmt: "fp16",    vram: 0.8,  notas: "Alta fidelidad visual D10" },
          { id: "ipa_f",      name: "IP-Adapter Plus Face",     tipo: "IP-Adapter", fmt: "fp16",    vram: 0.8,  notas: "Consistencia facial D10" },
          { id: "clip_vit",   name: "CLIP Vision ViT-H",        tipo: "Encoder",    fmt: "fp16",    vram: 0.6,  notas: "Requerido por IP-Adapter" },
          { id: "lora_sdxl",  name: "LoRA SDXL (por unidad)",   tipo: "LoRA",       fmt: "fp16",    vram: 0.2,  notas: "Añade por cada LoRA activa" },
          { id: "esrgan",     name: "4x-UltraSharp ESRGAN",     tipo: "Upscaler",   fmt: "fp32",    vram: 0.07, notas: "Upscaling · D11" },
          { id: "ult_usc",    name: "Ultimate SD Upscale",      tipo: "Upscaler",   fmt: "fp16",    vram: 0.1,  notas: "Nodo custom · no carga modelo extra" },
        ]
      },
      flux: {
        label: "Familia FLUX", color: "#a855f7",
        items: [
          { id: "fl_bf16",    name: "FLUX.1 Dev",               tipo: "Diffusion",  fmt: "bf16",    vram: 24,   notas: "Calidad máxima · GPU alta gama" },
          { id: "fl_fp8",     name: "FLUX.1 Dev",               tipo: "Diffusion",  fmt: "fp8",     vram: 12,   notas: "Recomendado para 16–24 GB VRAM" },
          { id: "fl_q8",      name: "FLUX.1 Dev",               tipo: "Diffusion",  fmt: "GGUF Q8", vram: 10,   notas: "Alta calidad cuantizado" },
          { id: "fl_q5",      name: "FLUX.1 Dev",               tipo: "Diffusion",  fmt: "GGUF Q5", vram: 7,    notas: "Equilibrio calidad/VRAM · 12 GB" },
          { id: "fl_q4",      name: "FLUX.1 Dev",               tipo: "Diffusion",  fmt: "GGUF Q4", vram: 5.5,  notas: "GPUs 8 GB · calidad reducida" },
          { id: "fl_krea",    name: "FLUX.1 Krea",              tipo: "Diffusion",  fmt: "fp8",     vram: 12,   notas: "Fine-tune · coherencia estilística D14" },
          { id: "fl_rew",     name: "FLUX.1 OneReward",         tipo: "Diffusion",  fmt: "fp8",     vram: 12,   notas: "Fine-tune RLHF · calidad percibida D14" },
          { id: "fl_kon",     name: "FLUX.1 Kontext",           tipo: "Diffusion",  fmt: "fp8",     vram: 12,   notas: "Edición contextual sin máscara D15" },
          { id: "fl_fil",     name: "FLUX.1 Fill",              tipo: "Diffusion",  fmt: "fp8",     vram: 12,   notas: "Inpainting / outpainting nativo D16" },
          { id: "fl_red",     name: "FLUX.1 Redux",             tipo: "Diffusion",  fmt: "fp8",     vram: 12,   notas: "Variaciones con alta consistencia D17" },
          { id: "fl_kle",     name: "FLUX.2 Klein 9B",          tipo: "Diffusion",  fmt: "fp8",     vram: 7,    notas: "Iteración rápida · menos VRAM D18" },
          { id: "fl_vae",     name: "VAE FLUX (ae.safetensors)",tipo: "VAE",        fmt: "fp16",    vram: 0.4,  notas: "Requerido · mismo para todos los FLUX" },
          { id: "fl_t5",      name: "T5-XXL encoder",           tipo: "Encoder",    fmt: "fp16",    vram: 9.6,  notas: "Se puede offload a RAM si hay poca VRAM" },
          { id: "fl_clip",    name: "CLIP-L encoder",           tipo: "Encoder",    fmt: "fp16",    vram: 0.25, notas: "Text encoder secundario FLUX" },
          { id: "cn_union",   name: "ControlNet Union Pro",     tipo: "ControlNet", fmt: "fp16",    vram: 2.5,  notas: "Unifica todos los modos FLUX D16" },
        ]
      },
      qwen: {
        label: "Familia Qwen-Image", color: "#f97316",
        items: [
          { id: "qvl_fp16",   name: "Qwen2.5-VL-7B",           tipo: "VL Model",   fmt: "fp16",    vram: 16,   notas: "Análisis visual · reverse prompting D19" },
          { id: "qvl_4bit",   name: "Qwen2.5-VL-7B",           tipo: "VL Model",   fmt: "4-bit",   vram: 5,    notas: "Cuantizado · GPU 8 GB D19" },
          { id: "qvl3_fp",    name: "Qwen3-VL-8B",             tipo: "VL Model",   fmt: "fp16",    vram: 18,   notas: "Razonamiento visual avanzado D19" },
          { id: "qvl3_4b",    name: "Qwen3-VL-8B",             tipo: "VL Model",   fmt: "4-bit",   vram: 6,    notas: "Cuantizado D19" },
          { id: "qi_fp8",     name: "Qwen-Image-2512",          tipo: "Diffusion",  fmt: "fp8",     vram: 12,   notas: "Generación con texto integrado D20" },
          { id: "qi_dist",    name: "Qwen-Image-2512 Distil",   tipo: "Diffusion",  fmt: "fp8",     vram: 9,    notas: "Versión distilada · más rápida D20" },
          { id: "qi_edit",    name: "Qwen-Image-Edit-2511",     tipo: "Diffusion",  fmt: "fp8",     vram: 12,   notas: "Edición por instrucción D21" },
          { id: "qi_enc",     name: "Qwen2.5-VL-7B (encoder)", tipo: "Encoder",    fmt: "fp8",     vram: 6,    notas: "Reutilizable D20·D21 · no recargar" },
          { id: "qi_vae",     name: "VAE Qwen-Image",           tipo: "VAE",        fmt: "fp16",    vram: 0.4,  notas: "Requerido · propio de la familia Qwen" },
          { id: "qi_l8",      name: "Lightning LoRA 8-steps",   tipo: "LoRA",       fmt: "fp16",    vram: 0.3,  notas: "Aceleración generación D20" },
          { id: "qi_l4",      name: "Lightning LoRA 4-steps",   tipo: "LoRA",       fmt: "fp16",    vram: 0.3,  notas: "Aceleración edición D21" },
        ]
      }
    };

    const GPUS = [
      { nombre: "NVIDIA RTX 3060",       vram: 12 },
      { nombre: "NVIDIA RTX 3060 Ti",    vram: 8  },
      { nombre: "NVIDIA RTX 3070",       vram: 8  },
      { nombre: "NVIDIA RTX 3080 10GB",  vram: 10 },
      { nombre: "NVIDIA RTX 3080 Ti",    vram: 12 },
      { nombre: "NVIDIA RTX 3090",       vram: 24 },
      { nombre: "NVIDIA RTX 3090 Ti",    vram: 24 },
      { nombre: "NVIDIA RTX 4060",       vram: 8  },
      { nombre: "NVIDIA RTX 4060 Ti 8G", vram: 8  },
      { nombre: "NVIDIA RTX 4060 Ti 16G",vram: 16 },
      { nombre: "NVIDIA RTX 4070",       vram: 12 },
      { nombre: "NVIDIA RTX 4070 Super", vram: 12 },
      { nombre: "NVIDIA RTX 4070 Ti",    vram: 12 },
      { nombre: "NVIDIA RTX 4070 Ti S",  vram: 16 },
      { nombre: "NVIDIA RTX 4080",       vram: 16 },
      { nombre: "NVIDIA RTX 4090",       vram: 24 },
      { nombre: "NVIDIA RTX 5070 Ti",    vram: 16 },
      { nombre: "NVIDIA RTX 5080",       vram: 16 },
      { nombre: "NVIDIA RTX 5090",       vram: 32 },
      { nombre: "AMD RX 7800 XT",        vram: 16 },
      { nombre: "AMD RX 7900 XT",        vram: 20 },
      { nombre: "AMD RX 7900 XTX",       vram: 24 },
      { nombre: "Apple M2 Pro (19-core)", vram: 19 },
      { nombre: "Apple M2 Max (38-core)", vram: 38 },
      { nombre: "Apple M3 Pro (18-core)", vram: 18 },
      { nombre: "Apple M4 Pro (20-core)", vram: 20 },
      { nombre: "Apple M4 Max (40-core)", vram: 40 },
    ];

    const OVERHEAD = 1.2;

    const allItems = Object.entries(MODELOS).flatMap(([mod, { items }]) =>
      items.map(i => ({ ...i, modulo: mod }))
    );

    // ─── UTILS ───────────────────────────────────────────────────────────────

    function getStatus(used, total) {
      const r = used / total;
      if (r <= 0.75) return { label: "✅ Cómodo",       color: "#22c55e", bg: "#052e16", desc: "Margen suficiente para resoluciones altas y batch." };
      if (r <= 0.95) return { label: "🟡 Ajustado",     color: "#eab308", bg: "#1c1a03", desc: "Funciona. Evita resoluciones muy altas o batch > 1." };
      if (r <= 1.15) return { label: "🔴 Con offload",  color: "#ef4444", bg: "#2d0a0a", desc: "ComfyUI volcará parte a RAM. Irá más lento pero ejecutará." };
      return               { label: "❌ Insuficiente",  color: "#71717a", bg: "#18181b", desc: "No ejecutará en tu GPU con esta combinación de modelos." };
    }

    function fmt(v) { return v < 1 ? `${Math.round(v * 1000)} MB` : `${v} GB`; }

    // ─── SUB-COMPONENTES ─────────────────────────────────────────────────────

    function VramBar({ used, total }) {
      const pct = Math.min((used / total) * 100, 100);
      const { color } = getStatus(used, total);
      const over = used > total * 1.15;
      return (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#71717a", marginBottom:5 }}>
            <span>Estimado: <b style={{ color: over ? "#ef4444" : color }}>{used.toFixed(1)} GB</b></span>
            <span>GPU: <b style={{ color:"#e2e8f0" }}>{total} GB</b></span>
          </div>
          <div style={{ height:8, borderRadius:99, background:"#27272a", overflow:"hidden" }}>
            <div style={{
              height:"100%", width:`${pct}%`, borderRadius:99,
              background: over
                ? "repeating-linear-gradient(45deg,#ef444477,#ef444477 5px,#ef444422 5px,#ef444422 10px)"
                : `linear-gradient(90deg, ${color}99, ${color})`,
              transition:"width 0.35s ease",
            }}/>
          </div>
        </div>
      );
    }

    function Chip({ text, color, bg }) {
      return (
        <span style={{
          display:"inline-flex", alignItems:"center",
          padding:"3px 10px", borderRadius:99, fontSize:11, fontWeight:700,
          color, background: bg, border:`1px solid ${color}33`
        }}>{text}</span>
      );
    }

    function ModelRow({ item, selected, onToggle }) {
      const color = MODELOS[item.modulo].color;
      const sel = selected;
      return (
        <div onClick={onToggle} style={{
          display:"flex", alignItems:"center", gap:12, padding:"9px 12px",
          borderRadius:7, cursor:"pointer",
          border:`1px solid ${sel ? color+"55" : "#27272a"}`,
          background: sel ? color+"0d" : "transparent",
          transition:"all 0.15s",
          userSelect:"none",
        }}>
          <div style={{
            width:15, height:15, borderRadius:4, flexShrink:0,
            border:`2px solid ${sel ? color : "#3f3f46"}`,
            background: sel ? color : "transparent",
            display:"flex", alignItems:"center", justifyContent:"center",
            transition:"all 0.15s",
          }}>
            {sel && <span style={{ fontSize:9, color:"#09090b", fontWeight:900, lineHeight:1 }}>✓</span>}
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap" }}>
              <span style={{ fontSize:13, fontWeight: sel ? 600 : 400, color: sel ? "#f4f4f5" : "#a1a1aa" }}>
                {item.name}
              </span>
              <span style={{
                fontSize:10, color:"#52525b", background:"#18181b",
                border:"1px solid #27272a", borderRadius:4, padding:"1px 6px",
                fontFamily:"'DM Mono', monospace"
              }}>{item.fmt}</span>
              <span style={{ fontSize:10, color:"#3f3f46" }}>{item.tipo}</span>
            </div>
            <div style={{ fontSize:11, color:"#52525b", marginTop:2 }}>{item.notas}</div>
          </div>
          <div style={{
            fontSize:12, fontWeight:700, color: sel ? color : "#52525b",
            whiteSpace:"nowrap", minWidth:50, textAlign:"right",
            fontFamily:"'DM Mono', monospace"
          }}>{fmt(item.vram)}</div>
        </div>
      );
    }

    // ─── APP PRINCIPAL ────────────────────────────────────────────────────────

    function App() {
      const [sel, setSel] = useState({});
      const [gpuIdx, setGpuIdx] = useState(7);
      const [customVram, setCustomVram] = useState("");
      const [vista, setVista] = useState("calc");
      const [filtro, setFiltro] = useState("todos");

      const gpu = customVram
        ? { nombre:"GPU personalizada", vram: parseFloat(customVram) || 0 }
        : GPUS[gpuIdx];

      const toggle = id => setSel(p => p[id]
        ? Object.fromEntries(Object.entries(p).filter(([k]) => k !== id))
        : { ...p, [id]: allItems.find(i => i.id === id).vram }
      );

      const totalModelos = Object.values(sel).reduce((a,b) => a+b, 0);
      const totalConOH   = totalModelos + OVERHEAD;
      const status       = getStatus(totalConOH, gpu.vram);
      const selCount     = Object.keys(sel).length;

      return (
        <div style={{ minHeight:"100vh", background:"#09090b", color:"#e2e8f0", padding:"32px 20px" }}>
          <div style={{ maxWidth:920, margin:"0 auto" }}>

            {/* HEADER */}
            <div style={{ marginBottom:28 }}>
              <div style={{ fontSize:10, color:"#3f3f46", letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:6 }}>
                IA Generativa · Producción Audiovisual · ComfyUI
              </div>
              <h1 style={{ fontSize:28, fontWeight:700, color:"#f4f4f5", letterSpacing:"-0.03em", marginBottom:6 }}>
                Calculadora de VRAM
              </h1>
              <p style={{ fontSize:13, color:"#52525b", lineHeight:1.6 }}>
                Selecciona los modelos que vas a cargar simultáneamente y comprueba si tu GPU puede ejecutarlos.
                Los valores son orientativos ±10–15% según resolución y configuración de offload.
              </p>
            </div>

            {/* TABS */}
            <div style={{ display:"flex", gap:6, marginBottom:24, borderBottom:"1px solid #27272a", paddingBottom:0 }}>
              {[["calc","⚙ Calculadora"], ["tabla","📋 Tabla de referencia"]].map(([v,l]) => (
                <button key={v} onClick={() => setVista(v)} style={{
                  padding:"8px 18px", background:"transparent", cursor:"pointer",
                  fontSize:13, fontWeight:600, border:"none",
                  color: vista===v ? "#f4f4f5" : "#52525b",
                  borderBottom: vista===v ? "2px solid #a855f7" : "2px solid transparent",
                  marginBottom:"-1px", transition:"all 0.15s"
                }}>{l}</button>
              ))}
            </div>

            {vista === "calc" ? (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 310px", gap:24, alignItems:"start" }}>

                {/* MODELOS */}
                <div>
                  {Object.entries(MODELOS).map(([modKey, { label, color, items }]) => (
                    <div key={modKey} style={{ marginBottom:32 }}>
                      <div style={{
                        display:"flex", alignItems:"center", gap:10, marginBottom:12,
                        paddingBottom:8, borderBottom:`1px solid ${color}22`
                      }}>
                        <div style={{ width:3, height:18, borderRadius:2, background:color, flexShrink:0 }}/>
                        <span style={{ fontSize:11, fontWeight:700, color, letterSpacing:"0.07em", textTransform:"uppercase" }}>
                          {label}
                        </span>
                      </div>
                      <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
                        {items.map(item => (
                          <ModelRow key={item.id} item={item} selected={!!sel[item.id]} onToggle={() => toggle(item.id)} />
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                {/* PANEL */}
                <div style={{ position:"sticky", top:20, display:"flex", flexDirection:"column", gap:14 }}>

                  {/* GPU */}
                  <div style={{ background:"#18181b", border:"1px solid #27272a", borderRadius:10, padding:16 }}>
                    <div style={{ fontSize:10, color:"#52525b", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:10 }}>
                      Tu GPU
                    </div>
                    <select value={gpuIdx} onChange={e => { setGpuIdx(+e.target.value); setCustomVram(""); }}
                      style={{
                        width:"100%", background:"#09090b", border:"1px solid #3f3f46",
                        borderRadius:7, padding:"8px 10px", color:"#e2e8f0",
                        fontSize:12, cursor:"pointer", marginBottom:10,
                        fontFamily:"'DM Mono', monospace"
                      }}>
                      {GPUS.map((g,i) => (
                        <option key={i} value={i}>{g.nombre} · {g.vram} GB</option>
                      ))}
                    </select>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:11, color:"#52525b", whiteSpace:"nowrap" }}>O introduce manualmente:</span>
                      <input type="number" min="1" max="96" placeholder="GB" value={customVram}
                        onChange={e => setCustomVram(e.target.value)}
                        style={{
                          width:70, background:"#09090b", border:"1px solid #3f3f46",
                          borderRadius:7, padding:"6px 10px", color:"#e2e8f0",
                          fontSize:13, fontFamily:"'DM Mono', monospace", textAlign:"center"
                        }}/>
                      <span style={{ fontSize:11, color:"#52525b" }}>GB</span>
                    </div>
                  </div>

                  {/* RESULTADO */}
                  <div style={{
                    background:"#18181b",
                    border:`1px solid ${status.color}44`,
                    borderRadius:10, padding:16
                  }}>
                    <div style={{ fontSize:10, color:"#52525b", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:12 }}>
                      Resultado
                    </div>
                    <Chip text={status.label} color={status.color} bg={status.bg} />
                    <p style={{ fontSize:11, color:"#71717a", marginTop:8, marginBottom:14, lineHeight:1.5 }}>
                      {status.desc}
                    </p>
                    <VramBar used={totalConOH} total={gpu.vram} />
                    <div style={{ marginTop:14, display:"flex", flexDirection:"column", gap:0 }}>
                      {[
                        ["Modelos seleccionados", `${totalModelos.toFixed(1)} GB`, false],
                        ["Overhead ComfyUI",       `${OVERHEAD} GB`,              false],
                        ["Total estimado",          `${totalConOH.toFixed(1)} GB`, true ],
                        ["VRAM disponible",          `${gpu.vram} GB`,             false],
                      ].map(([label, val, bold], i) => (
                        <div key={i} style={{
                          display:"flex", justifyContent:"space-between",
                          fontSize:12, padding:"6px 0",
                          borderTop: i===2 ? "1px solid #27272a" : "none",
                          marginTop: i===2 ? 6 : 0,
                        }}>
                          <span style={{ color:"#71717a" }}>{label}</span>
                          <span style={{
                            fontWeight: bold ? 700 : 400,
                            color: bold ? "#f4f4f5" : "#a1a1aa",
                            fontFamily:"'DM Mono', monospace"
                          }}>{val}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* STACK ACTIVO */}
                  {selCount > 0 && (
                    <div style={{ background:"#18181b", border:"1px solid #27272a", borderRadius:10, padding:16 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                        <span style={{ fontSize:10, color:"#52525b", letterSpacing:"0.1em", textTransform:"uppercase" }}>
                          Stack activo ({selCount})
                        </span>
                        <button onClick={() => setSel({})} style={{
                          fontSize:10, color:"#ef4444", background:"transparent",
                          border:"1px solid #ef444433", borderRadius:4,
                          padding:"2px 8px", cursor:"pointer"
                        }}>Limpiar todo</button>
                      </div>
                      {Object.keys(sel).map(id => {
                        const item = allItems.find(i => i.id === id);
                        if (!item) return null;
                        const color = MODELOS[item.modulo].color;
                        return (
                          <div key={id} onClick={() => toggle(id)} style={{
                            display:"flex", justifyContent:"space-between", alignItems:"center",
                            fontSize:11, padding:"5px 0",
                            borderBottom:"1px solid #1e1e20", cursor:"pointer"
                          }}>
                            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                              <div style={{ width:6, height:6, borderRadius:99, background:color, flexShrink:0 }}/>
                              <span style={{ color:"#a1a1aa" }}>{item.name}</span>
                              <span style={{ color:"#3f3f46", fontFamily:"'DM Mono', monospace", fontSize:10 }}>{item.fmt}</span>
                            </div>
                            <span style={{ color:color, fontFamily:"'DM Mono', monospace" }}>{fmt(item.vram)}</span>
                          </div>
                        );
                      })}
                    </div>
                  )}

                  <p style={{ fontSize:10, color:"#3f3f46", lineHeight:1.6 }}>
                    * Estimaciones orientativas. El consumo real puede variar ±10–15% según resolución,
                    batch size y configuración de offload en ComfyUI.
                  </p>
                </div>
              </div>

            ) : (
              /* TABLA */
              <div>
                <div style={{ display:"flex", gap:6, marginBottom:18, flexWrap:"wrap" }}>
                  {[["todos","Todos los módulos"], ...Object.entries(MODELOS).map(([k,v]) => [k, v.label])].map(([k,l]) => (
                    <button key={k} onClick={() => setFiltro(k)} style={{
                      padding:"5px 14px", borderRadius:6, fontSize:11, fontWeight:600,
                      cursor:"pointer", border:"1px solid",
                      background: filtro===k ? "#27272a" : "transparent",
                      borderColor: filtro===k ? "#52525b" : "#27272a",
                      color: filtro===k ? "#f4f4f5" : "#71717a",
                    }}>{l}</button>
                  ))}
                </div>
                <div style={{ background:"#18181b", border:"1px solid #27272a", borderRadius:10, overflow:"hidden" }}>
                  <table style={{ width:"100%" }}>
                    <thead>
                      <tr style={{ background:"#09090b" }}>
                        {["Módulo","Modelo","Tipo","Formato","VRAM","Notas"].map(h => (
                          <th key={h} style={{
                            padding:"10px 14px", textAlign:"left", fontWeight:600,
                            color:"#52525b", fontSize:10, letterSpacing:"0.08em",
                            textTransform:"uppercase", borderBottom:"1px solid #27272a",
                            fontFamily:"'DM Sans', sans-serif"
                          }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {Object.entries(MODELOS)
                        .filter(([k]) => filtro==="todos" || k===filtro)
                        .flatMap(([modKey, { label, color, items }]) =>
                          items.map((item, idx) => (
                            <tr key={item.id} style={{ borderBottom:"1px solid #1e1e20", background: idx%2===0 ? "transparent" : "#0d0d0f" }}>
                              <td style={{ padding:"8px 14px" }}>
                                {idx===0 && <span style={{ fontSize:10, fontWeight:700, color, letterSpacing:"0.06em", textTransform:"uppercase" }}>{label}</span>}
                              </td>
                              <td style={{ padding:"8px 14px", color:"#e2e8f0", fontSize:12 }}>{item.name}</td>
                              <td style={{ padding:"8px 14px", color:"#71717a", fontSize:11 }}>{item.tipo}</td>
                              <td style={{ padding:"8px 14px" }}>
                                <span style={{
                                  fontSize:10, color:"#a1a1aa", background:"#09090b",
                                  border:"1px solid #27272a", borderRadius:4, padding:"2px 6px",
                                  fontFamily:"'DM Mono', monospace"
                                }}>{item.fmt}</span>
                              </td>
                              <td style={{ padding:"8px 14px", fontWeight:700, color, fontSize:12, fontFamily:"'DM Mono', monospace" }}>
                                {fmt(item.vram)}
                              </td>
                              <td style={{ padding:"8px 14px", color:"#52525b", fontSize:11 }}>{item.notas}</td>
                            </tr>
                          ))
                        )}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            <div style={{ marginTop:32, paddingTop:20, borderTop:"1px solid #18181b", fontSize:10, color:"#27272a", textAlign:"center" }}>
              IA Generativa · Producción Audiovisual · Calculadora de VRAM · Uso interno
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
